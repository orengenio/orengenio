# OrenGen Platform — ERPNext on Coolify
#
# This docker-compose is designed for Coolify deployment.
# Traefik handles SSL and routing to the frontend nginx container on port 8080.
#
# Site name should match your domain: app.orengen.io
#
# Required env vars (set in Coolify):
#   DB_ROOT_PASSWORD, ADMIN_PASSWORD, ERPNEXT_VERSION
#
# Coolify will auto-generate SERVICE_FQDN_FRONTEND_8080 for the domain.

x-erpnext-common: &erpnext-common
  image: frappe/erpnext:${ERPNEXT_VERSION:-v15}
  restart: unless-stopped
  volumes:
    - sites:/home/frappe/frappe-bench/sites

services:
  # ── Nginx reverse proxy (entry point for Traefik) ──────────────
  frontend:
    <<: *erpnext-common
    command:
      - nginx-entrypoint.sh
    environment:
      - BACKEND=backend:8000
      - SOCKETIO=websocket:9000
      - FRAPPE_SITE_NAME_HEADER=${SITE_NAME:-app.orengen.io}
      - UPSTREAM_REAL_IP_ADDRESS=127.0.0.1
      - UPSTREAM_REAL_IP_HEADER=X-Forwarded-For
      - UPSTREAM_REAL_IP_RECURSIVE=off
      - PROXY_READ_TIMEOUT=120
      - CLIENT_MAX_BODY_SIZE=50m
      - SERVICE_FQDN_FRONTEND_8080
    depends_on:
      backend:
        condition: service_started
      websocket:
        condition: service_started

  # ── Frappe/ERPNext application server ──────────────────────────
  backend:
    <<: *erpnext-common
    depends_on:
      configurator:
        condition: service_completed_successfully

  # ── Background workers ─────────────────────────────────────────
  queue-short:
    <<: *erpnext-common
    command:
      - bench
      - worker
      - --queue
      - short,default
    depends_on:
      configurator:
        condition: service_completed_successfully

  queue-long:
    <<: *erpnext-common
    command:
      - bench
      - worker
      - --queue
      - long
    depends_on:
      configurator:
        condition: service_completed_successfully

  # ── Scheduler (cron jobs) ──────────────────────────────────────
  scheduler:
    <<: *erpnext-common
    command:
      - bench
      - schedule
    depends_on:
      configurator:
        condition: service_completed_successfully

  # ── WebSocket server (real-time updates) ───────────────────────
  websocket:
    <<: *erpnext-common
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    depends_on:
      configurator:
        condition: service_completed_successfully

  # ── One-shot configurator (writes common_site_config.json) ─────
  configurator:
    <<: *erpnext-common
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started

  # ── Site creator (one-shot, creates the ERPNext site) ──────────
  create-site:
    <<: *erpnext-common
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=$$(date +%s);
        until [[ -n $$(grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty") ]] &&
          [[ -n $$(grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty") ]] &&
          [[ -n $$(grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty") ]];
        do
          echo "Waiting for configurator...";
          sleep 5;
          if (( $$(date +%s)-start > 120 )); then
            echo "Could not find configurator! Exiting...";
            exit 1;
          fi
        done;
        echo "Configurator found, checking site...";
        if [[ ! -f sites/${SITE_NAME}/site_config.json ]]; then
          echo "Creating site ${SITE_NAME}...";
          bench new-site --no-mariadb-socket
            --mariadb-root-password=$${DB_ROOT_PASSWORD}
            --install-app erpnext
            --admin-password=$${ADMIN_PASSWORD}
            $${SITE_NAME};
        else
          echo "Site ${SITE_NAME} already exists, running migrate...";
          bench --site $${SITE_NAME} migrate;
        fi
    environment:
      SITE_NAME: ${SITE_NAME:-app.orengen.io}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      configurator:
        condition: service_completed_successfully

  # ── MariaDB ────────────────────────────────────────────────────
  db:
    image: mariadb:10.6
    restart: unless-stopped
    healthcheck:
      test: mysqladmin ping -h localhost --password=${DB_ROOT_PASSWORD}
      interval: 5s
      retries: 15
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql

  # ── Redis (cache) ──────────────────────────────────────────────
  redis-cache:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data

  # ── Redis (queue + socketio) ───────────────────────────────────
  redis-queue:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

volumes:
  db-data:
  redis-cache-data:
  redis-queue-data:
  sites:
