# OrenGen Platform — Appwrite on Coolify
#
# Appwrite BaaS at appwrite.orengen.io
# Provides: Auth, Database, Storage, Functions, Realtime, Messaging
#
# Coolify routes traffic via Traefik to the appwrite container on port 80.
#
# Required env vars (set in Coolify):
#   _APP_OPENSSL_KEY_V1 (generate with: openssl rand -hex 32)

x-logging: &x-logging
  logging:
    driver: json-file
    options:
      max-file: "5"
      max-size: "10m"

services:
  appwrite:
    image: appwrite/appwrite:${APPWRITE_VERSION:-1.6}
    restart: unless-stopped
    <<: *x-logging
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    environment:
      - SERVICE_FQDN_APPWRITE_80
      - _APP_ENV=${_APP_ENV:-production}
      - _APP_LOCALE=${_APP_LOCALE:-en}
      - _APP_DOMAIN=${_APP_DOMAIN:-appwrite.orengen.io}
      - _APP_DOMAIN_TARGET=${_APP_DOMAIN_TARGET:-appwrite.orengen.io}
      - _APP_DOMAIN_FUNCTIONS=${_APP_DOMAIN_FUNCTIONS:-functions.appwrite.orengen.io}
      - _APP_CONSOLE_WHITELIST_ROOT=${_APP_CONSOLE_WHITELIST_ROOT:-enabled}
      - _APP_CONSOLE_WHITELIST_EMAILS=${_APP_CONSOLE_WHITELIST_EMAILS:-}
      - _APP_CONSOLE_WHITELIST_IPS=${_APP_CONSOLE_WHITELIST_IPS:-}
      - _APP_SYSTEM_EMAIL_NAME=${_APP_SYSTEM_EMAIL_NAME:-OrenGen Platform}
      - _APP_SYSTEM_EMAIL_ADDRESS=${_APP_SYSTEM_EMAIL_ADDRESS:-noreply@orengen.io}
      - _APP_SYSTEM_RESPONSE_FORMAT=${_APP_SYSTEM_RESPONSE_FORMAT:-}
      - _APP_SYSTEM_SECURITY_EMAIL_ADDRESS=${_APP_SYSTEM_SECURITY_EMAIL_ADDRESS:-security@orengen.io}
      - _APP_OPTIONS_ABUSE=${_APP_OPTIONS_ABUSE:-enabled}
      - _APP_OPTIONS_ROUTER_PROTECTION=${_APP_OPTIONS_ROUTER_PROTECTION:-disabled}
      - _APP_OPTIONS_FORCE_HTTPS=${_APP_OPTIONS_FORCE_HTTPS:-disabled}
      - _APP_OPENSSL_KEY_V1=${_APP_OPENSSL_KEY_V1}
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_SCHEMA=appwrite
      - _APP_DB_USER=$SERVICE_USER_MARIADB
      - _APP_DB_PASS=$SERVICE_PASSWORD_MARIADB
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
      - _APP_STORAGE_LIMIT=${_APP_STORAGE_LIMIT:-30000000}
      - _APP_STORAGE_PREVIEW_LIMIT=${_APP_STORAGE_PREVIEW_LIMIT:-20000000}
      - _APP_STORAGE_ANTIVIRUS=${_APP_STORAGE_ANTIVIRUS:-disabled}
      - _APP_STORAGE_DEVICE=${_APP_STORAGE_DEVICE:-local}
      - _APP_LOGGING_PROVIDER=${_APP_LOGGING_PROVIDER:-}
      - _APP_LOGGING_CONFIG=${_APP_LOGGING_CONFIG:-}
      - _APP_USAGE_STATS=${_APP_USAGE_STATS:-enabled}
      - _APP_SMS_PROVIDER=${_APP_SMS_PROVIDER:-}
      - _APP_SMS_FROM=${_APP_SMS_FROM:-}
      - _APP_GRAPHQL_MAX_BATCH_SIZE=${_APP_GRAPHQL_MAX_BATCH_SIZE:-10}
      - _APP_GRAPHQL_MAX_COMPLEXITY=${_APP_GRAPHQL_MAX_COMPLEXITY:-250}
      - _APP_GRAPHQL_MAX_DEPTH=${_APP_GRAPHQL_MAX_DEPTH:-3}
    volumes:
      - appwrite-uploads:/storage/uploads
      - appwrite-cache:/storage/cache
      - appwrite-config:/storage/config
      - appwrite-certificates:/storage/certificates
      - appwrite-functions:/storage/functions
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  appwrite-realtime:
    image: appwrite/appwrite:${APPWRITE_VERSION:-1.6}
    restart: unless-stopped
    <<: *x-logging
    entrypoint: realtime
    environment:
      - _APP_ENV=${_APP_ENV:-production}
      - _APP_OPENSSL_KEY_V1=${_APP_OPENSSL_KEY_V1}
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_SCHEMA=appwrite
      - _APP_DB_USER=$SERVICE_USER_MARIADB
      - _APP_DB_PASS=$SERVICE_PASSWORD_MARIADB
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
      - _APP_LOGGING_PROVIDER=${_APP_LOGGING_PROVIDER:-}
      - _APP_LOGGING_CONFIG=${_APP_LOGGING_CONFIG:-}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  appwrite-worker-audits:
    image: appwrite/appwrite:${APPWRITE_VERSION:-1.6}
    restart: unless-stopped
    <<: *x-logging
    entrypoint: worker-audits
    environment:
      - _APP_ENV=${_APP_ENV:-production}
      - _APP_OPENSSL_KEY_V1=${_APP_OPENSSL_KEY_V1}
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_SCHEMA=appwrite
      - _APP_DB_USER=$SERVICE_USER_MARIADB
      - _APP_DB_PASS=$SERVICE_PASSWORD_MARIADB
