      - _APP_DB_PASS=$SERVICE_PASSWORD_MARIADB
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
      - _APP_LOGGING_PROVIDER=${_APP_LOGGING_PROVIDER:-}
      - _APP_LOGGING_CONFIG=${_APP_LOGGING_CONFIG:-}
    volumes:
      - appwrite-functions:/storage/functions
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  appwrite-worker-certificates:
    image: appwrite/appwrite:${APPWRITE_VERSION:-1.6}
    restart: unless-stopped
    <<: *x-logging
    entrypoint: worker-certificates
    environment:
      - _APP_ENV=${_APP_ENV:-production}
      - _APP_OPENSSL_KEY_V1=${_APP_OPENSSL_KEY_V1}
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_SCHEMA=appwrite
      - _APP_DB_USER=$SERVICE_USER_MARIADB
      - _APP_DB_PASS=$SERVICE_PASSWORD_MARIADB
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
      - _APP_DOMAIN=${_APP_DOMAIN:-appwrite.orengen.io}
      - _APP_DOMAIN_TARGET=${_APP_DOMAIN_TARGET:-appwrite.orengen.io}
      - _APP_DOMAIN_FUNCTIONS=${_APP_DOMAIN_FUNCTIONS:-functions.appwrite.orengen.io}
    volumes:
      - appwrite-config:/storage/config
      - appwrite-certificates:/storage/certificates
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  appwrite-worker-functions:
    image: appwrite/appwrite:${APPWRITE_VERSION:-1.6}
    restart: unless-stopped
