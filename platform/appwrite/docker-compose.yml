      - _APP_STORAGE_DEVICE=${_APP_STORAGE_DEVICE:-local}
      - _APP_LOGGING_PROVIDER=${_APP_LOGGING_PROVIDER:-}
      - _APP_LOGGING_CONFIG=${_APP_LOGGING_CONFIG:-}
      - DOCKERHUB_PULL_USERNAME=${DOCKERHUB_PULL_USERNAME:-}
      - DOCKERHUB_PULL_PASSWORD=${DOCKERHUB_PULL_PASSWORD:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appwrite-functions:/storage/functions
      - /tmp:/tmp
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  appwrite-worker-mails:
    image: appwrite/appwrite:${APPWRITE_VERSION:-1.6}
    restart: unless-stopped
    <<: *x-logging
    entrypoint: worker-mails
    environment:
      - _APP_ENV=${_APP_ENV:-production}
      - _APP_OPENSSL_KEY_V1=${_APP_OPENSSL_KEY_V1}
      - _APP_SYSTEM_EMAIL_NAME=${_APP_SYSTEM_EMAIL_NAME:-OrenGen Platform}
      - _APP_SYSTEM_EMAIL_ADDRESS=${_APP_SYSTEM_EMAIL_ADDRESS:-noreply@orengen.io}
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
      - _APP_SMTP_HOST=${_APP_SMTP_HOST:-}
      - _APP_SMTP_PORT=${_APP_SMTP_PORT:-}
      - _APP_SMTP_SECURE=${_APP_SMTP_SECURE:-}
      - _APP_SMTP_USERNAME=${_APP_SMTP_USERNAME:-}
      - _APP_SMTP_PASSWORD=${_APP_SMTP_PASSWORD:-}
    depends_on:
      redis:
        condition: service_started

  appwrite-worker-messaging:
    image: appwrite/appwrite:${APPWRITE_VERSION:-1.6}
    restart: unless-stopped
    <<: *x-logging
    entrypoint: worker-messaging
    environment:
      - _APP_ENV=${_APP_ENV:-production}
      - _APP_OPENSSL_KEY_V1=${_APP_OPENSSL_KEY_V1}
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_SCHEMA=appwrite
      - _APP_DB_USER=$SERVICE_USER_MARIADB
      - _APP_DB_PASS=$SERVICE_PASSWORD_MARIADB
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
      - _APP_SMS_PROVIDER=${_APP_SMS_PROVIDER:-}
      - _APP_SMS_FROM=${_APP_SMS_FROM:-}
      - _APP_LOGGING_PROVIDER=${_APP_LOGGING_PROVIDER:-}
      - _APP_LOGGING_CONFIG=${_APP_LOGGING_CONFIG:-}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  appwrite-worker-migrations:
    image: appwrite/appwrite:${APPWRITE_VERSION:-1.6}
    restart: unless-stopped
    <<: *x-logging
    entrypoint: worker-migrations
    environment:
      - _APP_ENV=${_APP_ENV:-production}
      - _APP_OPENSSL_KEY_V1=${_APP_OPENSSL_KEY_V1}
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_SCHEMA=appwrite
