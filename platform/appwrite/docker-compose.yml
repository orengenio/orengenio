      - _APP_DB_PASS=$SERVICE_PASSWORD_MARIADB
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  appwrite-maintenance:
    image: appwrite/appwrite:${APPWRITE_VERSION:-1.6}
    restart: unless-stopped
    <<: *x-logging
    entrypoint: maintenance
    environment:
      - _APP_ENV=${_APP_ENV:-production}
      - _APP_OPENSSL_KEY_V1=${_APP_OPENSSL_KEY_V1}
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_SCHEMA=appwrite
      - _APP_DB_USER=$SERVICE_USER_MARIADB
      - _APP_DB_PASS=$SERVICE_PASSWORD_MARIADB
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
      - _APP_MAINTENANCE_INTERVAL=${_APP_MAINTENANCE_INTERVAL:-86400}
      - _APP_MAINTENANCE_RETENTION_EXECUTION=${_APP_MAINTENANCE_RETENTION_EXECUTION:-1209600}
      - _APP_MAINTENANCE_RETENTION_CACHE=${_APP_MAINTENANCE_RETENTION_CACHE:-2592000}
      - _APP_MAINTENANCE_RETENTION_ABUSE=${_APP_MAINTENANCE_RETENTION_ABUSE:-86400}
      - _APP_MAINTENANCE_RETENTION_AUDIT=${_APP_MAINTENANCE_RETENTION_AUDIT:-1209600}
      - _APP_MAINTENANCE_RETENTION_USAGE_HOURLY=${_APP_MAINTENANCE_RETENTION_USAGE_HOURLY:-8640000}
      - _APP_MAINTENANCE_RETENTION_SCHEDULES=${_APP_MAINTENANCE_RETENTION_SCHEDULES:-86400}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  appwrite-schedule-functions:
    image: appwrite/appwrite:${APPWRITE_VERSION:-1.6}
    restart: unless-stopped
    <<: *x-logging
    entrypoint: schedule-functions
    environment:
      - _APP_ENV=${_APP_ENV:-production}
      - _APP_OPENSSL_KEY_V1=${_APP_OPENSSL_KEY_V1}
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_SCHEMA=appwrite
      - _APP_DB_USER=$SERVICE_USER_MARIADB
      - _APP_DB_PASS=$SERVICE_PASSWORD_MARIADB
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  appwrite-schedule-messages:
    image: appwrite/appwrite:${APPWRITE_VERSION:-1.6}
    restart: unless-stopped
    <<: *x-logging
    entrypoint: schedule-messages
    environment:
      - _APP_ENV=${_APP_ENV:-production}
      - _APP_OPENSSL_KEY_V1=${_APP_OPENSSL_KEY_V1}
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_SCHEMA=appwrite
      - _APP_DB_USER=$SERVICE_USER_MARIADB
      - _APP_DB_PASS=$SERVICE_PASSWORD_MARIADB
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  # ── MariaDB ────────────────────────────────────────────────────
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    <<: *x-logging
    command:
      - --innodb-flush-method=fsync
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: $SERVICE_PASSWORD_MARIADB
      MYSQL_DATABASE: appwrite
      MYSQL_USER: $SERVICE_USER_MARIADB
      MYSQL_PASSWORD: $SERVICE_PASSWORD_MARIADB
    volumes:
      - appwrite-mariadb:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h localhost -u root --password=$SERVICE_PASSWORD_MARIADB
      interval: 5s
      retries: 15

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    <<: *x-logging
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - appwrite-redis:/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      retries: 10

volumes:
  appwrite-mariadb:
  appwrite-redis:
  appwrite-uploads:
  appwrite-cache:
  appwrite-config:
  appwrite-certificates:
  appwrite-functions:
