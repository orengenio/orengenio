server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve GrapesJS library files
    location /grapesjs/ {
        alias /usr/share/nginx/html/grapesjs/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /grapesjs-preset-webpage/ {
        alias /usr/share/nginx/html/grapesjs-preset-webpage/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /grapesjs-blocks-basic/ {
        alias /usr/share/nginx/html/grapesjs-blocks-basic/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Main editor
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}